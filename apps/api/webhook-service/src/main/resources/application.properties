# ---- Server ----
server.port=8082
spring.application.name=webhook-service

# ---- Database ----
spring.datasource.url=jdbc:postgresql://localhost:5432/finpay_db
spring.datasource.username=finpay_user
spring.datasource.password=finpay_password
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ---- Flyway ----
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# ---- Kafka ----
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=webhook-dispatchers
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*
